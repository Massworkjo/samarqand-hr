<div id="app"><div class="empty" style="margin-top:40vh"><span class="ic">⏳</span><p>جاري تحميل النظام...</p></div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* =========================================================
   FIREBASE — قاعدة البيانات السحابية (Firestore)
========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyCYxsT2C1lBQpHficc00XBMWGEfp933D5I",
  authDomain: "samarqand-hr.firebaseapp.com",
  projectId: "samarqand-hr",
  storageBucket: "samarqand-hr.firebasestorage.app",
  messagingSenderId: "861740278896",
  appId: "1:861740278896:web:0c6a0fe146ab7b7baf40b5"
};
let FB_DB = null, FB_READY = false;
let FB_STATUS = {ok:false, code:'init', msg:'جاري الاتصال...'};
function withTimeout(promise, ms, label){
  return Promise.race([promise, new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout:'+label)), ms))]);
}
function fbErrorHelp(code){
  if(!code) return 'خطأ غير معروف';
  if(String(code).includes('operation-not-allowed') || String(code).includes('configuration-not-found') || String(code).includes('admin-restricted'))
    return '❗ تسجيل الدخول المجهول غير مفعّل. الحل: Firebase → Authentication → Sign-in method → Anonymous → Enable → Save';
  if(String(code).includes('permission-denied') || String(code).includes('PERMISSION_DENIED'))
    return '❗ قواعد الحماية غير منشورة. الحل: Firebase → Firestore Database → Rules → الصق القواعد → Publish';
  if(String(code).includes('unavailable') || String(code).includes('timeout') || String(code).includes('network'))
    return '📶 مشكلة إنترنت — تأكد من الاتصال وأعد فتح التطبيق';
  if(String(code).includes('api-key'))
    return '❗ مفتاح API غير صحيح — راجع firebaseConfig';
  return 'رمز الخطأ: '+code;
}
async function initFirebase(){
  try{
    if(typeof firebase === 'undefined') throw {code:'network:sdk-not-loaded'};
    firebase.initializeApp(firebaseConfig);
    FB_STATUS = {ok:false, code:'auth', msg:'جاري تسجيل الدخول...'};
    await withTimeout(firebase.auth().signInAnonymously(), 15000, 'auth');
    FB_DB = firebase.firestore();
    try{ await FB_DB.enablePersistence({synchronizeTabs:true}); }catch(e){ /* multi-tab or unsupported — ok */ }
    // فحص فعلي للكتابة والقراءة (يكشف مشكلة القواعد فورًا)
    await withTimeout(FB_DB.collection('hr').doc('connection_ping').set({t: Date.now()}), 15000, 'write-test');
    FB_READY = true;
    FB_STATUS = {ok:true, code:'ready', msg:'متصل بالسيرفر'};
  }catch(e){
    console.error('Firebase init failed:', e);
    FB_READY = false;
    const code = (e && (e.code || e.message)) || 'unknown';
    FB_STATUS = {ok:false, code, msg: fbErrorHelp(code)};
  }
}
const FB_CHUNK = 800000; // حجم القطعة الواحدة (حد المستند 1MB)
function fbKey(key){ return key.replace('sq:',''); }
async function fbSave(key, data){
  const base = fbKey(key);
  const json = JSON.stringify(data);
  const chunks = [];
  for(let i=0;i<json.length;i+=FB_CHUNK) chunks.push(json.slice(i,i+FB_CHUNK));
  if(chunks.length===0) chunks.push('');
  const batch = FB_DB.batch();
  chunks.forEach((c,i)=> batch.set(FB_DB.collection('hr').doc(base+'__'+i), {v:c, n:chunks.length, t:Date.now()}));
  // احذف القطع الزائدة من حفظ سابق أكبر
  for(let i=chunks.length;i<chunks.length+5;i++) batch.delete(FB_DB.collection('hr').doc(base+'__'+i));
  await withTimeout(batch.commit(), 15000, 'save');
}
async function fbLoad(key){
  const base = fbKey(key);
  const first = await withTimeout(FB_DB.collection('hr').doc(base+'__0').get(), 15000, 'load');
  if(!first.exists) throw new Error('no key');
  const n = first.data().n || 1;
  let json = first.data().v;
  for(let i=1;i<n;i++){
    const d = await FB_DB.collection('hr').doc(base+'__'+i).get();
    if(d.exists) json += d.data().v;
  }
  return JSON.parse(json);
}
/* مزامنة حية: أي تغيير من جهاز آخر ينعكس فورًا */
function startLiveSync(){
  if(!FB_READY) return;
  FB_DB.collection('hr').onSnapshot(snap=>{
    if(snap.metadata.hasPendingWrites) return; // تغييراتنا المحلية — تجاهل
    const touched = new Set();
    snap.docChanges().forEach(ch=>{
      const m = ch.doc.id.match(/^(.+)__\d+$/);
      if(m) touched.add(m[1]);
    });
    if(touched.size===0) return;
    (async ()=>{
      let changed = false;
      for(const base of touched){
        const stateKey = base; // نفس اسم المفتاح في state
        if(!(stateKey in state)) continue;
        try{
          const data = await fbLoad('sq:'+base);
          state[stateKey] = data;
          changed = true;
        }catch(e){}
      }
      if(changed){
        updateBellBadge();
        // لا نعيد الرسم إذا في نافذة مفتوحة حتى لا نقطع المستخدم وهو يكتب
        if(!document.getElementById('modalBg')) render();
      }
    })();
  }, err=>console.error('live sync error:', err));
}
</script>

async function loadOrInit(key, seed){
  if(FB_READY){
    try{ return await fbLoad(key); }
    catch(e){ try{ await fbSave(key, seed); }catch(e2){ console.error(e2); } return seed; }
  }
  // احتياط: التخزين المحلي للأرتيفاكت (وضع التطوير)
  try{ const res = await window.storage.get(key, true); return res && res.value ? JSON.parse(res.value) : seed; }
  catch(e){ try{ await window.storage.set(key, JSON.stringify(seed), true); }catch(e2){} return seed; }
}
async function save(key, value){
  if(FB_READY){
    try{ await fbSave(key, value); return; }
    catch(e){ console.error('firestore save failed', e); toast('⚠️ تعذر الحفظ على السيرفر — تحقق من الإنترنت'); return; }
  }
  try{ await window.storage.set(key, JSON.stringify(value), true); }
  catch(e){ console.error('storage save failed', e); toast('تعذر الحفظ، حاول مرة أخرى'); }
}

function distanceMeters(lat1, lon1, lat2, lon2){
  const R = 6371000, toRad = d=>d*Math.PI/180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function pad2(n){ return String(n).padStart(2,'0'); }
function nowTime(){ const d=new Date(); return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function nowClock(){ const d=new Date(); return pad2(d.getHours())+':'+pad2(d.getMinutes())+':'+pad2(d.getSeconds()); }
function timeToMin(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }
function esc(s){ return (s===undefined||s===null) ? '' : String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function initials(name){ return (name||'?').trim().slice(0,1); }
function avatarHtml(emp, size){
  size = size||40;
  if(emp && emp.photo) return `<img src="${emp.photo}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--teal)" alt="">`;
  return `<div class="avatar" style="width:${size}px;height:${size}px">${initials(emp?emp.name:'?')}</div>`;
}
function compressPhoto(file){
  return new Promise((res, rej)=>{
    const img = new Image();
    img.onload = ()=>{
      const max = 220;
      let w = img.width, h = img.height;
      if(w>h){ if(w>max){ h=h*max/w; w=max; } } else { if(h>max){ w=w*max/h; h=max; } }
      const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = ()=>rej(new Error('تعذر قراءة الصورة'));
    img.src = URL.createObjectURL(file);
  });
}
function findEmp(id){ return state.employees.find(e=>String(e.id)===String(id)); }
function dailyRate(emp){ return Math.round((emp.baseSalary/30)*100)/100; }
function weeklyAdvCap(emp){ return emp.weeklyAdvCap!=null ? emp.weeklyAdvCap : Math.round(emp.baseSalary*WEEKLY_ADV_PCT*100)/100; }
function monthlyAdvCap(emp){ return emp.monthlyAdvCap!=null ? emp.monthlyAdvCap : Math.round(emp.baseSalary*MONTHLY_ADV_PCT*100)/100; }
function annualCap(emp){ return emp.annualLeaveCap!=null ? emp.annualLeaveCap : 14; }
function sickCap(emp){ return emp.sickLeaveCap!=null ? emp.sickLeaveCap : 14; }
function annualRemaining(emp){ return Math.max(0, Math.round((annualCap(emp)-(emp.leaveUsed||0))*100)/100); }
function sickRemaining(emp){ return Math.max(0, Math.round((sickCap(emp)-(emp.sickLeaveUsed||0))*100)/100); }
function weeklyAdvUsed(emp){
  const now = new Date(); const start = new Date(now); start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0);
  return Math.round(state.advances.filter(a=>String(a.employeeId)===String(emp.id) && a.status==='موافق عليها' && new Date(a.date)>=start).reduce((s,a)=>s+a.amount,0)*100)/100;
}
function monthlyAdvUsed(emp){
  const now = new Date();
  return Math.round(state.advances.filter(a=>{
    if(String(a.employeeId)!==String(emp.id) || a.status!=='موافق عليها') return false;
    const d = new Date(a.date);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }).reduce((s,a)=>s+a.amount,0)*100)/100;
}
function daysBetween(d1,d2){ return Math.round((new Date(d2)-new Date(d1))/86400000)+1; }
function minToTime(m){ m=((m%1440)+1440)%1440; return pad2(Math.floor(m/60))+':'+pad2(m%60); }
function fmtDur(mins){ const h=Math.floor(mins/60), m=mins%60; return (h?h+' ساعة ':'')+(m?m+' دقيقة':'')||'0 دقيقة'; }
function isHoliday(dateStr){ return state.holidays.find(h=>h.date===dateStr); }
function isFriday(dateStr){ return new Date(dateStr+'T12:00:00').getDay()===5; }
function empWorkStart(emp){ return emp.workStart || WORK_START; }
function empWorkEnd(emp){ return emp.workEnd || WORK_END[emp.category] || WORK_END['إداري']; }

    if(tag && state.notifications.some(n=>n.tag===tag && String(n.to)===String(t))) return; // dedup
    state.notifications.push({id:'NTF-'+Date.now()+Math.random().toString(16).slice(2,6),
      to:String(t), title, body, tag:tag||null, link:link||null, read:false, date:todayStr(), time:nowTime()});
  });
  if(state.notifications.length>300) state.notifications = state.notifications.slice(-300);

/* ---------- مراقبة عدم البصم ---------- */
function checkMissedClocks(){
  const today = todayStr();
  if(isFriday(today) || isHoliday(today)) return;
  const nowM = timeToMin(nowTime());
  state.employees.filter(e=>e.status==='نشط').forEach(e=>{
    const rec = state.attendance.find(a=>String(a.employeeId)===String(e.id) && a.date===today);
    if(nowM >= timeToMin(MISS_IN_ALERT) && (!rec || !rec.timeIn)){
      notify(['admin','supervisor'], '⏰ لم يسجل حضوره', `${e.name} (#${e.id}) لم يسجل الحضور حتى ${MISS_IN_ALERT}`, 'missin-'+today+'-'+e.id, {k:'att'});
    }
    if(rec && rec.timeIn && !rec.timeOut && nowM > timeToMin(empWorkEnd(e))+10){
      notify(['admin','supervisor'], '🚪 لم يسجل انصرافه', `${e.name} (#${e.id}) لم يسجل الانصراف بعد نهاية دوامه ${empWorkEnd(e)}`, 'missout-'+today+'-'+e.id, {k:'att'});
    }
  });
}
function startWatchers(){
  clearInterval(window.__missTimer);
  window.__missTimer = setInterval(checkMissedClocks, 60000);
  checkMissedClocks();
}

function salaryBreakdown(emp){
  const gross = emp.baseSalary + (emp.otherAllowances||0);
  const social = Math.round(gross*SOCIAL_SECURITY_PCT*100)/100;
  const health = emp.healthInsurance||0;
  const vioFines = state.violations.filter(v=>String(v.employeeId)===String(emp.id)).reduce((s,v)=>s+(v.fine||0),0);
  const advDue = state.advances.filter(a=>String(a.employeeId)===String(emp.id) && a.status==='موافق عليها' && (a.remainingInstallments||0)>0)
    .reduce((s,a)=>s+(a.installmentAmount||0),0);
  const otherDed = state.deductions.filter(d=>String(d.employeeId)===String(emp.id)).reduce((s,d)=>s+d.amount,0);
  const bonusTotal = Math.round(state.bonuses.filter(b=>String(b.employeeId)===String(emp.id)).reduce((s,b)=>s+b.amount,0)*100)/100;
  const totalDeduct = Math.round((social+health+vioFines+advDue+otherDed)*100)/100;
  const net = Math.round((gross+bonusTotal-totalDeduct)*100)/100;
  return {gross, social, health, vioFines, advDue, otherDed, bonusTotal, totalDeduct, net};
}

/* leave/salary overflow deduction helper — used for lateness + early-leave permissions */
async function deductFromLeaveOrSalary(emp, dayFraction, reasonLabel){
  dayFraction = Math.round(dayFraction*100)/100;
  if(dayFraction<=0) return null;
  let fromLeave=0, fromSalary=0;
  const available = annualRemaining(emp);
  if(available >= dayFraction){
    emp.leaveUsed = Math.round(((emp.leaveUsed||0)+dayFraction)*100)/100;
    fromLeave = dayFraction;
  } else {
    fromLeave = available;
    const shortfall = Math.round((dayFraction-available)*100)/100;
    emp.leaveUsed = Math.round(((emp.leaveUsed||0)+available)*100)/100;
    fromSalary = Math.round(shortfall*dailyRate(emp)*100)/100;
    state.deductions.push({id:'DED-'+Date.now()+Math.random().toString(16).slice(2,6), employeeId:emp.id, employeeName:emp.name, date: todayStr(), amount: fromSalary, reason: reasonLabel+' (تجاوز رصيد الإجازة)'});
    await save('sq:deductions', state.deductions);
  }
  await save('sq:employees', state.employees);
  return {fromLeave, fromSalary};
}

/* ========== Biometric login (WebAuthn) ========== */
function b64ToBuf(b64){ const s = atob(b64.replace(/-/g,'+').replace(/_/g,'/')); const buf = new Uint8Array(s.length); for(let i=0;i<s.length;i++) buf[i]=s.charCodeAt(i); return buf.buffer; }
function bufToB64(buf){ const bytes = new Uint8Array(buf); let s=''; bytes.forEach(b=>s+=String.fromCharCode(b)); return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }

async function registerBiometric(emp){
  if(!window.PublicKeyCredential){ toast(state.lang==='ar'?'جهازك لا يدعم البصمة':'Biometrics not supported on this device'); return; }
  try{
    const cred = await navigator.credentials.create({ publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name: 'Samarqand HR' },
      user: { id: new TextEncoder().encode(String(emp.id)), name: String(emp.id), displayName: emp.name },
      pubKeyCredParams: [{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
      authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
      timeout: 60000,
    }});
    emp.biometricId = bufToB64(cred.rawId);
    await save('sq:employees', state.employees);
    toast(state.lang==='ar'?'تم تفعيل البصمة ✅':'Biometrics enabled ✅');
    render();
  }catch(e){ toast(state.lang==='ar'?'تعذر تفعيل البصمة: '+e.message:'Failed: '+e.message); }
}

async function doBiometricLogin(){
  const errEl = document.getElementById('loginErr'); errEl.textContent='';
  const id = document.getElementById('loginId').value.trim();
  if(!id){ errEl.textContent = state.lang==='ar'?'أدخل الرقم الوظيفي أولاً ثم اضغط الدخول بالبصمة':'Enter your Employee ID first'; return; }
  const emp = findEmp(id);
  if(!emp || !emp.biometricId){ errEl.textContent = state.lang==='ar'?'البصمة غير مفعّلة لهذا الحساب — فعّلها من "ملفي" بعد أول دخول بالرمز':'Biometrics not enrolled for this account'; return; }
  if(!window.PublicKeyCredential){ errEl.textContent = state.lang==='ar'?'جهازك لا يدعم البصمة':'Biometrics not supported'; return; }
  try{
    await navigator.credentials.get({ publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials: [{ id: b64ToBuf(emp.biometricId), type: 'public-key' }],
      userVerification: 'required',
      timeout: 60000,
    }});
    state.role='employee'; state.currentEmployee=emp.id; state.screen='home'; render(); showDailyProductAd();
  }catch(e){ errEl.textContent = state.lang==='ar'?'فشل التحقق بالبصمة':'Biometric verification failed'; }
}

function doClock(type){
  const emp = findEmp(state.currentEmployee);
  const statusEl = document.getElementById('geoStatus');
  if(emp.category==='مندوب'){
    recordClock(emp, type, null, null, null);
    return;
  }
  if(!navigator.geolocation){ toast('المتصفح لا يدعم تحديد الموقع'); return; }
  statusEl.textContent = '📡 يتم تحديد موقعك...';
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude, longitude} = pos.coords;
    const dist = Math.round(distanceMeters(latitude, longitude, TARGET_LAT, TARGET_LNG));
    const within = dist <= GEOFENCE_M;
    recordClock(emp, type, dist, within, true);
  }, err=>{
    statusEl.textContent = '⚠️ تعذر الوصول للموقع: '+err.message;
    toast('فعّل صلاحية الموقع من المتصفح للمتابعة');
  }, {enableHighAccuracy:true, timeout:10000});
}

async function recordClock(emp, type, dist, within, geoTracked){
  let rec = todaysRecord(emp.id);
  if(!rec){ rec = {id:'ATT-'+Date.now(), employeeId: emp.id, employeeName: emp.name, date: todayStr()}; state.attendance.push(rec); }
  const t = nowTime();
  const isRep = emp.category==='مندوب';
  const hol = isHoliday(todayStr());
  const holidayWork = !!hol && !isFriday(todayStr());
  if(type==='in'){
    rec.timeIn = t; rec.withinIn = within; rec.distIn = dist; rec.geoTracked = geoTracked;
    if(holidayWork) rec.holiday = hol.name;
    // العطلة الرسمية: بدون خصومات تأخير + مكافأة نصف يوم (يوم بيوم ونصف) — بدون المناديب
    if(holidayWork && !isRep){
      state.bonuses.push({id:'BON-'+Date.now()+Math.random().toString(16).slice(2,6), employeeId:emp.id, employeeName:emp.name, date: todayStr(), amount: Math.round(0.5*dailyRate(emp)*100)/100, type:'عمل يوم عطلة رسمية', note:'العمل يوم '+hol.name+' يُحسب يوم بيوم ونصف'});
      await save('sq:bonuses', state.bonuses);
      toast('🎉 عمل بيوم عطلة رسمية — يُحسب يوم بيوم ونصف');
    }
    // lateness (لا تُحسب أيام العطل الرسمية)
    const lateMin = timeToMin(t) - timeToMin(empWorkStart(emp));
    if(lateMin > GRACE_MIN && !holidayWork){
      rec.lateMinutes = lateMin;
      if(lateMin >= LATE_HALFDAY_THRESHOLD){
        const cut = Math.round(0.5*dailyRate(emp)*100)/100;
        state.deductions.push({id:'DED-'+Date.now()+Math.random().toString(16).slice(2,6), employeeId:emp.id, employeeName:emp.name, date: todayStr(), amount: cut, cutType:'خصم لمرة واحدة', reason:'تأخير '+lateMin+' دقيقة — خصم نصف يوم من الراتب'});
        await save('sq:deductions', state.deductions);
        toast(`تأخرت ${lateMin} دقيقة — تم خصم نصف يوم (${cut} د.أ) من الراتب مباشرة`);
      } else {
        const dayFraction = Math.round((lateMin/DAY_MINUTES)*100)/100;
        const result = await deductFromLeaveOrSalary(emp, dayFraction, 'تأخير عن الدوام '+lateMin+' دقيقة');
        if(result) toast(`تأخرت ${lateMin} دقيقة — تم خصم ${result.fromLeave} يوم من رصيد إجازتك${result.fromSalary?(' و'+result.fromSalary+' د.أ من الراتب'):''}`);
      }
    }
    if(isRep) await notify(['admin','supervisor'], '📍 حضور مندوب', `${emp.name} سجل حضوره الساعة ${t}${rec.lateMinutes?(' (متأخر '+rec.lateMinutes+' دقيقة)'):''}`, null, {k:'att'});
  } else {
    rec.timeOut = t; rec.withinOut = within; rec.distOut = dist;
    const endMin = timeToMin(empWorkEnd(emp));
    // مغادرة تلقائية للمندوب إذا ترك السوق قبل نهاية دوامه
    if(isRep && timeToMin(t) < endMin){
      const dur = endMin - timeToMin(t);
      state.mughadarat.push({id:'MUG-'+Date.now(), employeeId: emp.id, employeeName: emp.name,
        date: todayStr(), startTime: t, endTime: empWorkEnd(emp), durationMin: dur,
        timing:'نهاية الدوام', reason:'مغادرة تلقائية — انصراف المندوب من السوق قبل نهاية الدوام', auto:true,
        status:'قيد المراجعة', needsSup:false, supStatus:'—', admStatus:'قيد المراجعة', deductSource:null});
      await save('sq:mughadarat', state.mughadarat);
      const autoMugId = state.mughadarat[state.mughadarat.length-1].id;
      await notify(['admin','supervisor'], '⏱️ مغادرة مبكرة لمندوب', `${emp.name} غادر السوق ${t} قبل نهاية دوامه ${empWorkEnd(emp)} — سُجلت مغادرة ${fmtDur(dur)} بانتظار قرار المدير`, null, {k:'mug', id:autoMugId});
      toast(`سُجلت مغادرة تلقائية من ${t} حتى ${empWorkEnd(emp)} — بانتظار قرار المدير`);
    }
    // overtime بعد نهاية الدوام — للموظفين فقط (بدون المناديب وموظفي العمولة)
    const isCommission = isRep || (emp.jobTitle||'').includes('مشرف مبيعات') || (emp.jobTitle||'').includes('مدير مبيعات');
    const otMin = timeToMin(t) - endMin;
    if(otMin > 0 && !isCommission){
      const rate = holidayWork ? HOLIDAY_OT_RATE : OVERTIME_RATE;
      const hourlyRate = emp.baseSalary/30/8;
      const otPay = Math.round((otMin/60)*hourlyRate*rate*100)/100;
      rec.overtimeMinutes = otMin; rec.overtimePay = otPay; rec.overtimeRate = rate;
      state.bonuses.push({id:'BON-'+Date.now()+Math.random().toString(16).slice(2,6), employeeId:emp.id, employeeName:emp.name, date: todayStr(), amount: otPay, type:'عمل إضافي', note:'عمل إضافي '+fmtDur(otMin)+' بمعدل '+rate+' من أجر الساعة'+(holidayWork?' (عطلة رسمية: ساعة بساعة ونصف)':'')});
      await save('sq:bonuses', state.bonuses);
      toast(`عمل إضافي ${fmtDur(otMin)} — أُضيف ${otPay} د.أ لراتبك 🎉`);
    }
    if(isRep) await notify(['admin','supervisor'], '🚪 انصراف مندوب', `${emp.name} سجل انصرافه الساعة ${t}`, null, {k:'att'});
  }
  await save('sq:attendance', state.attendance);
  const statusEl = document.getElementById('geoStatus');
  if(statusEl){
    if(geoTracked===null) statusEl.textContent = 'تم تسجيل ' + (type==='in'?'الحضور':'الانصراف') + ' بدون تتبع موقع (مندوب مبيعات)';
    else statusEl.textContent = within ? `✅ داخل النطاق (${dist} م من الشركة)` : `⚠️ خارج النطاق (${dist} م) — تم التسجيل مع ملاحظة`;
  }
  toast(type==='in' ? 'تم تسجيل الحضور' : 'تم تسجيل الانصراف');
  render();
}

/* ---------- منطق الموافقة المزدوجة (المشرف + المدير بالتوازي) ---------- */
async function finalizeAdvance(adv){
  if(adv.status!=='قيد المراجعة') return;
  if(adv.supStatus==='مرفوضة' || adv.admStatus==='مرفوضة'){
    adv.status='مرفوضة';
    await notify(String(adv.employeeId), '💵 قرار السلفة', `تم رفض طلب السلفة بقيمة ${adv.amount} د.أ`, null, {k:'adv'});
    return;
  }
  const supOk = !adv.needsSup || adv.supStatus==='موافق عليها';
  if(supOk && adv.admStatus==='موافق عليها'){
    adv.status='موافق عليها';
    adv.installments = adv.installments||1;
    adv.frequency = adv.frequency||'شهري';
    adv.installmentAmount = Math.round((adv.amount/adv.installments)*100)/100;
    adv.remainingInstallments = adv.installments;
    await notify(String(adv.employeeId), '💵 تمت الموافقة على سلفتك ✅', `سلفة ${adv.amount} د.أ — خطة التقسيط: ${adv.installments} دفعة ${adv.frequency} (${adv.installmentAmount} د.أ لكل قسط)`, null, {k:'adv'});
  } else if(adv.admStatus==='موافق عليها' || adv.supStatus==='موافق عليها'){
    await notify(String(adv.employeeId), '💵 موافقة أولى على سلفتك', `وافق ${adv.admStatus==='موافق عليها'?'المدير':'المشرف'} على سلفة ${adv.amount} د.أ — بانتظار الموافقة الثانية`);
  }
}
async function finalizeLeave(lv){
  if(lv.status!=='قيد المراجعة') return;
  if(lv.supStatus==='مرفوضة' || lv.admStatus==='مرفوضة'){
    lv.status='مرفوضة';
    await notify(String(lv.employeeId), '🌴 قرار الإجازة', `تم رفض طلب إجازتك (${lv.type} · ${lv.days} يوم)`, null, {k:'lv'});
    return;
  }
  const supOk = !lv.needsSup || lv.supStatus==='موافق عليها';
  if(supOk && lv.admStatus==='موافق عليها'){
    lv.status='موافق عليها';
    const emp = findEmp(lv.employeeId);
    let dedNote='';
    if(emp && lv.type!=='بدون راتب'){
      if(lv.deductSource==='خصم من الراتب'){
        const amt = Math.round(lv.days*dailyRate(emp)*100)/100;
        state.deductions.push({id:'DED-'+Date.now()+Math.random().toString(16).slice(2,6), employeeId:emp.id, employeeName:emp.name, date: todayStr(), amount: amt, cutType:'خصم إجازة', reason:'إجازة '+lv.type+' '+lv.days+' يوم — خصم من الراتب بقرار المدير'});
        await save('sq:deductions', state.deductions);
        dedNote=' (خصم من الراتب: '+amt+' د.أ)';
      } else if(lv.deductSource==='بدون خصم'){
        dedNote=' (بدون خصم)';
      } else {
        if(lv.type==='مرضية'){ emp.sickLeaveUsed = Math.round(((emp.sickLeaveUsed||0)+lv.days)*100)/100; }
        else { emp.leaveUsed = Math.round(((emp.leaveUsed||0)+lv.days)*100)/100; }
        await save('sq:employees', state.employees);
        dedNote=' (خُصمت من رصيد الإجازات)';
      }
    }
    await notify(String(lv.employeeId), '🌴 تمت الموافقة على إجازتك ✅', `${lv.type} من ${lv.startDate} إلى ${lv.endDate} (${lv.days} يوم)${dedNote}`, null, {k:'lv'});
  } else if(lv.admStatus==='موافق عليها' || lv.supStatus==='موافق عليها'){
    await notify(String(lv.employeeId), '🌴 موافقة أولى على إجازتك', `وافق ${lv.admStatus==='موافق عليها'?'المدير':'المشرف'} — بانتظار الموافقة الثانية`);
  }
}
async function finalizeMug(m){
  if(m.status!=='قيد المراجعة') return;
  if(m.supStatus==='مرفوضة' || m.admStatus==='مرفوضة'){
    m.status='مرفوضة';
    await notify(String(m.employeeId), '⏱️ قرار المغادرة', `تم رفض طلب المغادرة ${m.startTime}→${m.endTime}`, null, {k:'mug'});
    return;
  }
  const supOk = !m.needsSup || m.supStatus==='موافق عليها';
  if(supOk && m.admStatus==='موافق عليها'){
    m.status='موافق عليها';
    const emp = findEmp(m.employeeId);
    let dedNote='';
    if(emp){
      const dayFraction = Math.round((m.durationMin/DAY_MINUTES)*100)/100;
      if(m.deductSource==='خصم من الراتب'){
        const amt = Math.round(dayFraction*dailyRate(emp)*100)/100;
        state.deductions.push({id:'DED-'+Date.now()+Math.random().toString(16).slice(2,6), employeeId:emp.id, employeeName:emp.name, date: todayStr(), amount: amt, cutType:'خصم مغادرة', reason:'مغادرة '+fmtDur(m.durationMin)+' — خصم من الراتب بقرار المدير'});
        await save('sq:deductions', state.deductions);
        dedNote=' (خصم من الراتب: '+amt+' د.أ)';
      } else if(m.deductSource==='بدون خصم'){
        dedNote=' (بدون خصم)';
      } else {
        const r = await deductFromLeaveOrSalary(emp, dayFraction, 'مغادرة '+fmtDur(m.durationMin)+': '+m.reason);
        dedNote = r ? ' (خُصم '+r.fromLeave+' يوم من رصيد الإجازات'+(r.fromSalary?(' و'+r.fromSalary+' د.أ من الراتب'):'')+')' : '';
      }
    }
    await notify(String(m.employeeId), '⏱️ تمت الموافقة على مغادرتك ✅', `${m.startTime}→${m.endTime} (${fmtDur(m.durationMin)})${dedNote}`, null, {k:'mug'});
  } else if(m.admStatus==='موافق عليها' || m.supStatus==='موافق عليها'){
    await notify(String(m.employeeId), '⏱️ موافقة أولى على مغادرتك', `بانتظار الموافقة الثانية`);
  }
}

  `);
  const okM = document.getElementById('supMgOk'), noM = document.getElementById('supMgNo');
  if(okM) okM.onclick = ()=>decideSup('mug', id, 'موافق عليها');
  if(noM) noM.onclick = ()=>decideSup('mug', id, 'مرفوضة');
}
async function decideSup(kind, id, decision){
  let item, key, label, finalizer;
  if(kind==='adv'){ item = state.advances.find(a=>a.id===id); key='sq:advances'; label='سلفة'; finalizer=finalizeAdvance; }
  else if(kind==='lv'){ item = state.leaveRequests.find(l=>l.id===id); key='sq:leaveRequests'; label='إجازة'; finalizer=finalizeLeave; }
  else { item = state.mughadarat.find(m=>m.id===id); key='sq:mughadarat'; label='مغادرة'; finalizer=finalizeMug; }
  if(!item) return;
  item.supStatus = decision;
  item.supDecisionDate = todayStr()+' '+nowTime();
  await audit('قرار المشرف — '+label, `${item.employeeName}: ${decision}`);
  await notify('admin', '👤 قرار المشرف — '+label, `${item.employeeName}: ${decision==='موافق عليها'?'وافق المشرف':'رفض المشرف'}`, null, {k: kind==='adv'?'adv':kind==='lv'?'lv':'mug', id: item.id});
  await finalizer(item);
  await save(key, kind==='adv'?state.advances:kind==='lv'?state.leaveRequests:state.mughadarat);
  closeModal(); toast('تم تسجيل قرارك'); render();
}

/* ---------- Bonus & Cut (admin) ---------- */
function openAddBonusModal(empId){
  const emp = findEmp(empId); if(!emp) return;
  showModal(`
    <div class="modal-head"><h3>إضافة مكافأة — ${esc(emp.name)}</h3><button class="modal-close" data-close>✕</button></div>
    <label class="field-label">نوع المكافأة</label>
    <select id="bonusType">${BONUS_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    <label class="field-label">المبلغ (د.أ)</label>
    <input id="bonusAmount" type="number" min="1">
    <label class="field-label">ملاحظة (سبب المكافأة — تظهر للموظف)</label>
    <textarea id="bonusNote" rows="2" placeholder="مثال: تحقيق هدف مبيعات شهر 6"></textarea>
    <button class="btn orange" id="submitBonusBtn">حفظ المكافأة</button>
  `);
  document.getElementById('submitBonusBtn').onclick = async ()=>{
    const amt = parseFloat(document.getElementById('bonusAmount').value);
    const note = document.getElementById('bonusNote').value.trim();
    if(!amt || amt<=0){ toast('أدخل مبلغًا صحيحًا'); return; }
    if(!note){ toast('اكتب سبب المكافأة ليعرفه الموظف'); return; }
    state.bonuses.push({id:'BON-'+Date.now(), employeeId: emp.id, employeeName: emp.name,
      type: document.getElementById('bonusType').value, amount: amt, note, date: todayStr()});
    await save('sq:bonuses', state.bonuses);
    await audit('إضافة مكافأة', emp.name+': '+amt+' د.أ — '+note);
    await notify(String(emp.id), '⭐ مكافأة جديدة', 'أُضيفت لك مكافأة '+amt+' د.أ — '+note);
    closeModal(); toast('تمت إضافة المكافأة ⭐'); render();
  };
}

    workEnd: document.getElementById('f_workEnd').value || (prior ? prior.workEnd : null) || null,
    biometricId: prior ? prior.biometricId : undefined,
  };
  if(editing){ const idx = state.employees.findIndex(e=>String(e.id)===String(editing)); state.employees[idx] = data; }
  else { state.employees.push(data); }
  await save('sq:employees', state.employees);
  await audit(editing?'تعديل بيانات موظف':'إضافة موظف', data.name+' (#'+data.id+')');

}

async function decideAdvance(id, status, installments, frequency){
  const adv = state.advances.find(a=>a.id===id);

    <select id="lvDeductSource">
      <option ${lv.deductSource==='خصم من رصيد الإجازات'||!lv.deductSource?'selected':''}>خصم من رصيد الإجازات</option>
      <option ${lv.deductSource==='خصم من الراتب'?'selected':''}>خصم من الراتب</option>
      <option ${lv.deductSource==='بدون خصم'?'selected':''}>بدون خصم</option>
    </select>
    <div class="btnrow"><button class="btn" id="approveLvBtn">✅ موافقة المدير</button><button class="btn danger" id="rejectLvBtn">رفض</button></div>
    `:`<div class="row"><span class="lbl">مصدر الخصم</span><span class="val">${esc(lv.deductSource||'خصم من رصيد الإجازات')}</span></div>`}
  `);
  if(!editable) return;
  const updDays = ()=>{
    const s = document.getElementById('lvDecStart').value, e = document.getElementById('lvDecEnd').value;
    if(s&&e&&new Date(e)>=new Date(s)) document.getElementById('lvDecDays').textContent = daysBetween(s,e);
  };
  document.getElementById('lvDecStart').onchange = updDays;
  document.getElementById('lvDecEnd').onchange = updDays;
  document.getElementById('approveLvBtn').onclick = ()=>decideLeave(id,'موافق عليها');
  document.getElementById('rejectLvBtn').onclick = ()=>decideLeave(id,'مرفوضة');
}
async function decideLeave(id, status){
  const lv = state.leaveRequests.find(l=>l.id===id);
  if(lv.needsSup===undefined){ lv.needsSup=false; lv.supStatus='—'; }
  if(status==='موافق عليها'){
    // المدير يستطيع تعديل المدة قبل الموافقة
    const sEl = document.getElementById('lvDecStart'), eEl = document.getElementById('lvDecEnd');
    if(sEl && eEl && sEl.value && eEl.value && new Date(eEl.value)>=new Date(sEl.value)){
      const newDays = daysBetween(sEl.value, eEl.value);
      if(sEl.value!==lv.startDate || eEl.value!==lv.endDate){
        lv.origStartDate = lv.origStartDate||lv.startDate;
        lv.origEndDate = lv.origEndDate||lv.endDate;
        lv.origDays = lv.origDays||lv.days;
        await audit('تعديل مدة إجازة', `${lv.employeeName}: من ${lv.startDate}→${lv.endDate} (${lv.days}ي) إلى ${sEl.value}→${eEl.value} (${newDays}ي)`);
        await notify(String(lv.employeeId), '✏️ تم تعديل مدة إجازتك', `عدّل المدير الإجازة لتصبح من ${sEl.value} إلى ${eEl.value} (${newDays} يوم بدلاً من ${lv.days})`);
        lv.startDate = sEl.value; lv.endDate = eEl.value; lv.days = newDays;
      }
    }
    const dsEl = document.getElementById('lvDeductSource');
    lv.deductSource = dsEl ? dsEl.value : (lv.deductSource||'خصم من رصيد الإجازات');
  }
  lv.admStatus = status;
  lv.admDecisionDate = todayStr()+' '+nowTime();
  await audit('قرار المدير — إجازة', `${lv.employeeName}: ${status} (${lv.type} ${lv.days} يوم${status==='موافق عليها'?(' · '+lv.deductSource):''})`);
  await finalizeLeave(lv);
  await save('sq:leaveRequests', state.leaveRequests);
  closeModal(); toast('تم تسجيل قرارك'); render();
}

function loadSheetJS(){
  return new Promise((res, rej)=>{
    if(window.XLSX) return res();
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = res; s.onerror = ()=>rej(new Error('تعذر تحميل مكتبة الإكسل — تأكد من الاتصال بالإنترنت'));
    document.head.appendChild(s);
  });
}

  addSheet('الإشعارات', state.notifications.slice(-200).map(n=>({

  addSheet('سجل التدقيق', state.audit.slice(-300).map(a=>({

async function downloadBackup(){
  const data = {
    exportedAt: new Date().toISOString(),
    employees: state.employees, attendance: state.attendance, advances: state.advances,
    violations: state.violations, custody: state.custody, transfers: state.transfers,
    leaveRequests: state.leaveRequests, deductions: state.deductions, bonuses: state.bonuses,
    notifications: state.notifications, mughadarat: state.mughadarat, holidays: state.holidays, audit: state.audit,
  };
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'سمرقند_نسخة_احتياطية_'+todayStr()+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  await audit('نسخة احتياطية', 'تنزيل نسخة احتياطية كاملة');
  toast('تم تنزيل النسخة الاحتياطية 💾');
}
function restoreBackup(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data.employees || !Array.isArray(data.employees)) throw new Error('ملف غير صالح');
      if(!confirm('⚠️ الاستعادة ستستبدل كل البيانات الحالية بمحتوى النسخة الاحتياطية.\nهل أنت متأكد؟')) return;
      const keys = ['employees','attendance','advances','violations','custody','transfers','leaveRequests','deductions','bonuses','notifications','mughadarat','holidays','audit'];
      for(const k of keys){ if(data[k]){ state[k] = data[k]; await save('sq:'+k, data[k]); } }
      await audit('استعادة نسخة', 'استعادة نسخة احتياطية من ملف: '+file.name);
      toast('تمت الاستعادة بنجاح ✅'); render();
    }catch(e){ toast('فشل الاستعادة: '+e.message); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

    if(state.holidays.some(h=>h.date===d)){ toast('يوجد عطلة بهذا التاريخ مسبقًا'); return; }

  };
}

function openOvertimeReport(){
  const otRecs = state.attendance.filter(r=>(r.overtimeMinutes||0)>0).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const byEmp = {};
  otRecs.forEach(r=>{
    if(!byEmp[r.employeeId]) byEmp[r.employeeId] = {name:r.employeeName, mins:0, pay:0};
    byEmp[r.employeeId].mins += r.overtimeMinutes; byEmp[r.employeeId].pay += (r.overtimePay||0);
  });
  const totalMins = otRecs.reduce((s,r)=>s+r.overtimeMinutes,0);
  const totalPay = Math.round(otRecs.reduce((s,r)=>s+(r.overtimePay||0),0)*100)/100;
  showModal(`
    <div class="modal-head"><h3>⏰ تقرير العمل الإضافي</h3><button class="modal-close" data-close>✕</button></div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="stat"><b>${fmtDur(totalMins)}</b><span>إجمالي الإضافي</span></div>
      <div class="stat"><b>${totalPay} د.أ</b><span>إجمالي القيمة</span></div>
    </div>
    <div class="section-title">المجموع لكل موظف</div>
    ${Object.keys(byEmp).length===0 ? '<p style="font-size:12.5px;color:var(--muted)">لا يوجد عمل إضافي مسجل</p>' :
      Object.values(byEmp).map(e=>`<div class="row"><span class="lbl">${esc(e.name)}</span><span class="val">${fmtDur(e.mins)} · ${Math.round(e.pay*100)/100} د.أ</span></div>`).join('')}
    <div class="section-title">التفاصيل (الوقت والتاريخ)</div>
    ${otRecs.slice(0,40).map(r=>`<div class="row"><span class="lbl">${r.date} — ${esc(r.employeeName)}<br><small style="color:#999">${r.timeIn||''} → ${r.timeOut||''} · معدل ${r.overtimeRate||OVERTIME_RATE}${r.holiday?(' · '+esc(r.holiday)):''}</small></span><span class="val" style="color:#1f8f63">${fmtDur(r.overtimeMinutes)} · +${r.overtimePay} د.أ</span></div>`).join('')}
  `, true);
}

  showModal(`

    <div class="section-title">حسابات الإدارة</div>
    <label class="field-label">كلمة سر المدير</label>
    <input id="cfgAdminPass" value="${esc(state.config.adminPassword)}">
    <div class="grid2">
      <div class="field"><label class="field-label">اسم مستخدم المشرف</label><input id="cfgSupUser" value="${esc(state.config.supervisorUser)}"></div>
      <div class="field"><label class="field-label">كلمة سر المشرف</label><input id="cfgSupPass" value="${esc(state.config.supervisorPassword)}"></div>
    </div>
    <button class="btn" id="saveCfgPassBtn">حفظ كلمات سر الإدارة</button>
    <div class="section-title">الأرقام السرية للموظفين</div>
    <button class="btn orange" id="genPinsBtn" style="margin-bottom:10px">🎲 توليد أرقام سرية عشوائية (6 أرقام) للجميع</button>
    <p style="font-size:11px;color:var(--muted);margin:0 0 8px">اضغط على أي موظف لتغيير رقمه السري فورًا (أو غيّرها جماعيًا عبر ملف الإكسل — عمود "الرقم السري").</p>
    ${state.employees.map(e=>`
      <div class="row" data-pinemp="${e.id}" style="cursor:pointer">
        <span class="lbl">${esc(e.name)} <small style="color:#999">#${e.id}</small></span>
        <span class="val">••••  ›</span>
      </div>`).join('')}
  `, true);
  document.getElementById('saveCfgPassBtn').onclick = async ()=>{
    const ap = document.getElementById('cfgAdminPass').value.trim();
    const su = document.getElementById('cfgSupUser').value.trim();
    const sp = document.getElementById('cfgSupPass').value.trim();
    if(!ap || !su || !sp){ toast('لا يمكن ترك أي حقل فارغًا'); return; }
    state.config.adminPassword = ap; state.config.supervisorUser = su; state.config.supervisorPassword = sp;
    await save('sq:config', state.config);
    await audit('تغيير كلمات سر الإدارة', 'تم تحديث بيانات دخول المدير/المشرف');
    closeModal(); toast('تم حفظ كلمات السر ✅ (تنطبق على كل الأجهزة)');
  };
  document.querySelectorAll('[data-pinemp]').forEach(el=> el.onclick = ()=>openChangePinModal(el.dataset.pinemp));
  document.getElementById('genPinsBtn').onclick = generateRandomPins;
}
async function generateRandomPins(){
  if(!confirm('⚠️ سيتم تغيير الأرقام السرية لجميع الموظفين إلى أرقام عشوائية جديدة من 6 أرقام.\nالأرقام القديمة ستتوقف فورًا، ويجب توزيع الأرقام الجديدة على الموظفين.\nهل أنت متأكد؟')) return;
  const used = new Set();
  const randPin = ()=>{ let p; do{ p = String(Math.floor(100000 + Math.random()*900000)); }while(used.has(p)); used.add(p); return p; };
  state.employees.forEach(e=>{ e.pin = randPin(); });
  await save('sq:employees', state.employees);
  await audit('توليد أرقام سرية', 'أرقام عشوائية جديدة (6 أرقام) لجميع الموظفين ('+state.employees.length+')');
  showModal(`
    <div class="modal-head"><h3>🎲 الأرقام السرية الجديدة</h3><button class="modal-close" data-close>✕</button></div>
    <div class="note" style="border-color:var(--orange)">⚠️ هذه القائمة تظهر الآن فقط — نزّلها كملف إكسل ووزع الأرقام على الموظفين. الأرقام محفوظة أيضًا في ملف كل موظف وفي الإكسل الشامل.</div>
    ${state.employees.map(e=>`<div class="row"><span class="lbl">${esc(e.name)} <small style="color:#999">#${e.id}</small></span><span class="val" style="font-family:monospace;font-size:15px;letter-spacing:2px">${esc(String(e.pin))}</span></div>`).join('')}
    <button class="btn" id="downloadPinsBtn">📥 تنزيل القائمة (Excel)</button>
  `, true);
  document.getElementById('downloadPinsBtn').onclick = async ()=>{
    try{ await loadSheetJS(); }catch(e){ toast(e.message); return; }
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(state.employees.map(e=>({'الرقم الوظيفي':e.id,'الاسم':e.name,'القسم':e.department,'الرقم السري الجديد':e.pin})));
    XLSX.utils.book_append_sheet(wb, ws, 'الأرقام السرية');
    XLSX.writeFile(wb, 'أرقام_سرية_'+todayStr()+'.xlsx');
    toast('تم تنزيل القائمة ✅');
  };
}
function openChangePinModal(empId){
  const emp = findEmp(empId); if(!emp) return;
  showModal(`
    <div class="modal-head"><h3>🔐 الرقم السري — ${esc(emp.name)}</h3><button class="modal-close" data-close>✕</button></div>
    <div class="row"><span class="lbl">الرقم الحالي</span><span class="val">${esc(String(emp.pin))}</span></div>
    <label class="field-label">الرقم السري الجديد (4-6 أرقام)</label>
    <input id="newPinInput" inputmode="numeric" maxlength="6" placeholder="مثال: 2580">
    <button class="btn" id="savePinBtn">حفظ الرقم الجديد</button>
  `);
  document.getElementById('savePinBtn').onclick = async ()=>{
    const p = document.getElementById('newPinInput').value.trim();
    if(!/^[0-9]{4,6}$/.test(p)){ toast('الرقم يجب أن يكون 4 إلى 6 أرقام'); return; }
    emp.pin = p;
    await save('sq:employees', state.employees);
    await audit('تغيير رقم سري', emp.name+' (#'+emp.id+')');
    await notify(String(emp.id), '🔐 تم تغيير رقمك السري', 'قام المدير بتحديث رقمك السري — استخدم الرقم الجديد عند الدخول القادم');
    closeModal(); toast('تم تغيير الرقم السري ✅');
  };
}

/* ---------- ⭐ منتج التركيز اليومي (اختياري) ---------- */
function openFocusProductModal(){
  const fp = state.config.focusProduct;
  const activeToday = fp && fp.date===todayStr();
  showModal(`
    <div class="modal-head"><h3>⭐ منتج التركيز اليوم</h3><button class="modal-close" data-close>✕</button></div>
    <p style="font-size:11.5px;color:var(--muted);margin:0 0 8px">اختر الصنف الذي تريد أن يراه الجميع اليوم عند فتح التطبيق. الاختيار <b>ليس إلزاميًا</b> — بدون اختيار يعرض التطبيق منتجًا تلقائيًا بالتناوب.</p>
    ${activeToday ? `<div class="note" style="border-color:var(--orange)">اختيار اليوم الحالي: <b>${esc(DAILY_PRODUCTS[fp.idx].name)}</b></div>` : `<div class="note">لا يوجد اختيار لليوم — العرض تلقائي.</div>`}
    <button class="btn outline small" id="clearFocusBtn" style="margin-bottom:10px">↩️ إلغاء الاختيار (عرض تلقائي)</button>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${DAILY_PRODUCTS.map((p,i)=>`
      <div data-focusidx="${i}" style="cursor:pointer;border:2px solid ${activeToday&&fp.idx===i?'var(--orange)':'var(--line)'};border-radius:12px;padding:8px;text-align:center;background:#fff">
        ${p.img && AD_IMG[p.img] ? `<img src="data:image/jpeg;base64,${AD_IMG[p.img]}" style="width:100%;border-radius:8px;margin-bottom:4px" alt="">` : `<div style="font-size:26px;margin:8px 0">🍬</div>`}
        <b style="font-size:11.5px;color:var(--teal-dark);display:block">${esc(p.name)}</b>
        <small style="font-size:9.5px;color:#999">${esc(p.brand)}</small>
      </div>`).join('')}
    </div>
  `, true);
  document.getElementById('clearFocusBtn').onclick = async ()=>{
    state.config.focusProduct = null;
    await save('sq:config', state.config);
    await audit('منتج التركيز', 'إلغاء الاختيار — عرض تلقائي');
    closeModal(); toast('رجع العرض التلقائي');
  };
  document.querySelectorAll('[data-focusidx]').forEach(el=> el.onclick = async ()=>{
    const idx = parseInt(el.dataset.focusidx);
    state.config.focusProduct = {date: todayStr(), idx};
    await save('sq:config', state.config);
    await audit('منتج التركيز', 'اختيار: '+DAILY_PRODUCTS[idx].name);
    await notify(['supervisor'], '⭐ منتج التركيز اليوم', 'حدد المدير منتج اليوم: '+DAILY_PRODUCTS[idx].name+' — ركزوا عليه بالبيع');
    closeModal(); toast('تم اختيار: '+DAILY_PRODUCTS[idx].name+' ⭐');
  });
}

/* ---------- 📤 رفع إكسل معدّل (أدمن فقط) ---------- */
function excelTimeToHM(v){
  if(typeof v === 'number'){ const mins = Math.round(v*24*60); return minToTime(mins); }
  if(typeof v === 'string'){
    const m = v.trim().match(/^([0-9]{1,2}):([0-9]{2})/);
    if(m) return pad2(parseInt(m[1]))+':'+m[2];
  }
  return null;
}
async function importFromExcel(ev){
  const file = ev.target.files[0]; ev.target.value=''; if(!file) return;
  toast('⏳ جاري قراءة الملف...');
  try{ await loadSheetJS(); }catch(e){ toast(e.message); return; }
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const wb = XLSX.read(reader.result, {type:'array'});
      let updated=0, added=0, holReplaced=false;
      // — شيت الموظفين
      const empWs = wb.Sheets['الموظفون'];
      if(empWs){
        const rows = XLSX.utils.sheet_to_json(empWs, {defval:null});
        rows.forEach(r=>{
          const id = r['الرقم الوظيفي']; if(id==null || id==='') return;
          let emp = findEmp(id);
          const isNew = !emp;
          if(isNew){
            emp = {id: id, name:'', jobTitle:'', department:'', category:'إداري', employmentType:'شهري', status:'نشط',
              hireDate: todayStr(), nationalId:'', phone:'', governorate:'', address:'', supervisor:'',
              baseSalary:0, otherAllowances:0, healthInsurance:0, leaveUsed:0, sickLeaveUsed:0, pin:'1234', photo:null, workStart:null, workEnd:null};
            state.employees.push(emp); added++;
          } else updated++;
          const map = {'الاسم':'name','المسمى':'jobTitle','القسم':'department','الفئة':'category','نوع التوظيف':'employmentType',
            'الحالة':'status','تاريخ التعيين':'hireDate','الرقم الوطني':'nationalId','الهاتف':'phone','المحافظة':'governorate',
            'العنوان':'address','المشرف':'supervisor'};
          Object.keys(map).forEach(col=>{ if(r[col]!=null && r[col]!=='') emp[map[col]] = String(r[col]).trim(); });
          ['الراتب الأساسي','بدلات','تأمين صحي'].forEach((col,i)=>{
            if(r[col]!=null && r[col]!==''){ const num = parseFloat(r[col]); if(!isNaN(num)) emp[['baseSalary','otherAllowances','healthInsurance'][i]] = num; }
          });
          if(r['بداية الدوام']!=null){ const t = excelTimeToHM(r['بداية الدوام']); if(t) emp.workStart = t; }
          if(r['نهاية الدوام']!=null){ const t = excelTimeToHM(r['نهاية الدوام']); if(t) emp.workEnd = t; }
          if(r['الرقم السري']!=null && /^[0-9]{4,6}$/.test(String(r['الرقم السري']).trim())) emp.pin = String(r['الرقم السري']).trim();
        });
        await save('sq:employees', state.employees);
      }
      // — شيت العطل الرسمية
      const holWs = wb.Sheets['العطل الرسمية'];
      if(holWs){
        const rows = XLSX.utils.sheet_to_json(holWs, {defval:null});
        const newHols = [];
        rows.forEach(r=>{
          let d = r['التاريخ'];
          if(typeof d === 'number'){ const dt = XLSX.SSF.parse_date_code(d); if(dt) d = dt.y+'-'+pad2(dt.m)+'-'+pad2(dt.d); }
          if(typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d.trim()) && r['المناسبة']) newHols.push({date:d.trim(), name:String(r['المناسبة']).trim()});
        });
        if(newHols.length){ state.holidays = newHols; await save('sq:holidays', state.holidays); holReplaced=true; }
      }
      if(!empWs && !holWs){ toast('⚠️ لم أجد شيت "الموظفون" أو "العطل الرسمية" في الملف'); return; }
      await audit('رفع إكسل', `تحديث ${updated} موظف · إضافة ${added} موظف${holReplaced?' · تحديث العطل الرسمية':''}`);
      if(FB_READY) toast(`تم الرفع للسيرفر ✅ — تحديث ${updated} · إضافة ${added}${holReplaced?' · العطل محدّثة':''}`);
      else toast('⚠️ الملف قُرئ لكن لا يوجد اتصال بالسيرفر — التغييرات محلية فقط! اضغط على المؤشر الأحمر للفحص');
      render();
    }catch(e){ console.error(e); toast('فشل قراءة الملف: '+e.message); }
  };
  reader.readAsArrayBuffer(file);
}

/* =========================================================
   MODAL HELPERS
========================================================= */
function showModal(innerHtml, center){
  closeModal();
  const bg = document.createElement('div');
  bg.className = 'modal-bg' + (center ? ' center' : '');
  bg.id = 'modalBg';
  bg.innerHTML = `<div class="modal">${innerHtml}</div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click', e=>{ if(e.target===bg) closeModal(); });
  bg.querySelectorAll('[data-close]').forEach(b=> b.onclick = closeModal);
}
function closeModal(){ const el = document.getElementById('modalBg'); if(el) el.remove(); }

/* =========================================================
   BOOT
========================================================= */
applyLangDir();
init();
</script>
